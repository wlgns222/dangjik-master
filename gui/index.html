<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dangjik Master - Admin</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root {
            --sidebar-bg: #F9FAFB;
            --main-bg: #FFFFFF;
            --text-main: #111827;
            --text-sub: #6B7280;
            --border: #E5E7EB;
            --accent: #0F172A;
            --input-bg: #F3F4F6;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--main-bg);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
            letter-spacing: -0.02em;
        }

        /* 1. 사이드바 너비 확장 (240px -> 280px) */
        .sidebar {
            width: 280px; 
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 32px 0;
        }
        
        /* 폰트 사이즈 업 */
        .sidebar-brand {
            padding: 0 24px 32px;
            font-size: 24px; /* 20px -> 24px */
            font-weight: 800;
            color: var(--accent);
            letter-spacing: -0.05em;
        }

        .nav-menu { list-style: none; }
        .nav-item {
            padding: 14px 24px; /* 클릭 영역 넓힘 */
            margin: 4px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px; /* 14px -> 16px */
            font-weight: 500;
            color: var(--text-sub);
            transition: all 0.2s;
        }
        .nav-item:hover { background-color: #F3F4F6; color: var(--text-main); }
        .nav-item.active {
            background-color: #E2E8F0;
            color: var(--accent);
            font-weight: 600;
        }

        /* 메인 콘텐츠 영역 */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 56px;
        }

        /* 2. 글자가 커진 만큼 본문 영역 넓이 확장 (720px -> 800px) */
        .content-wrapper {
            max-width: 800px;
            margin: 0 auto;
        }

        .page-header {
            margin-bottom: 64px;
        }
        .page-header h1 {
            font-size: 36px; /* 32px -> 36px */
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: -0.03em;
        }
        .page-header p { 
            color: var(--text-sub); 
            font-size: 18px; /* 16px -> 18px */
        }

        /* 섹션 구분 */
        .form-section {
            margin-bottom: 64px;
        }

        .section-title {
            font-size: 22px; /* 18px -> 22px */
            font-weight: 600;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 16px;
        }
        
        .section-number {
            color: var(--text-sub);
            font-size: 18px; /* 15px -> 18px */
            font-weight: 500;
        }

        /* 폼 요소 레이아웃 */
        .input-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 28px;
        }
        .full-width {
            grid-column: 1 / -1;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 12px; /* 라벨과 입력창 사이 여백 증가 */
        }

        /* 3. 라벨 및 인풋창 텍스트 크기 확장 */
        label {
            font-size: 15px; /* 13px -> 15px */
            font-weight: 600;
            color: #374151;
        }

        input[type="text"], 
        input[type="date"], 
        input[type="file"] {
            width: 100%;
            padding: 16px 20px; /* 입력창 내부 여백 증가로 시원하게 */
            background-color: var(--input-bg);
            border: 1px solid transparent;
            border-radius: 8px;
            font-family: inherit;
            font-size: 16px; /* 14px -> 16px */
            color: var(--text-main);
            transition: all 0.2s ease;
        }
        
        input[type="file"] { padding: 13px 16px; }

        input:hover { background-color: #E5E7EB; }
        input:focus {
            outline: none;
            background-color: var(--main-bg);
            border-color: #94A3B8;
            box-shadow: 0 0 0 4px rgba(148, 163, 184, 0.15);
        }

        /* 읽기 전용 뱃지 스타일 */
        .badge-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 8px;
        }
        .badge {
            padding: 10px 18px;
            background-color: var(--input-bg);
            border-radius: 6px;
            font-size: 15px; /* 13px -> 15px */
            font-weight: 600;
            color: var(--text-main);
        }

        /* 하단 고정 액션 바 */
        .form-actions {
            margin-top: 48px;
            padding-top: 40px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 80px;
        }

        .status-text {
            font-size: 16px; /* 14px -> 16px */
            color: var(--text-sub);
        }

        /* 4. 생성 버튼 크기 확장 */
        .btn-submit {
            background-color: var(--accent);
            color: #FFFFFF;
            border: none;
            padding: 18px 40px; /* 버튼 큼직하게 변경 */
            border-radius: 8px;
            font-size: 18px; /* 15px -> 18px */
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .btn-submit:hover {
            background-color: #1E293B;
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-brand">Dangjik Master</div>
        <ul class="nav-menu">
            <li class="nav-item active">새 근무표 작성</li>
            <li class="nav-item">근무 규칙 설정</li>
            <li class="nav-item">도움말</li>
        </ul>
    </aside>

    <main class="main-content">
        <div class="content-wrapper">
            <div class="page-header">
                <h1>새 근무표 작성</h1>
                <p>근무표 생성을 위한 기초 데이터를 입력해 주세요.</p>
            </div>

            <form id="wizardForm"> 
                
                <div class="form-section">
                    <h2 class="section-title"><span class="section-number">01</span> 데이터 파일 업로드</h2>
                    <div class="input-grid">
                        <div class="form-group full-width">
                            <label>용사 명단 (CSV)</label>
                            <input type="file" id="workerFile" accept=".csv">
                        </div>
                        <div class="form-group">
                            <label>열외 일정 (CSV)</label>
                            <input type="file" id="exceptionFile" accept=".csv">
                        </div>
                        <div class="form-group">
                            <label>공휴일 일정 (CSV)</label>
                            <input type="file" id="holidayFile" accept=".csv">
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h2 class="section-title"><span class="section-number">02</span> 배정 기간 및 특수 일정</h2>
                    <div class="input-grid">
                        <div class="form-group">
                            <label>근무 시작일</label>
                            <input type="date" id="startDate">
                        </div>
                        <div class="form-group">
                            <label>근무 종료일</label>
                            <input type="date" id="endDate">
                        </div>
                        <div class="form-group">
                            <label>72사단 마지막 식기 당번일</label>
                            <input type="date" id="ldDate">
                        </div>
                        <div class="form-group">
                            <label>PX병 마지막 불침번 (3일 주기)</label>
                            <input type="date" id="pxDate">
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h2 class="section-title"><span class="section-number">03</span> 직전 근무자 군번 입력</h2>
                    <div class="input-grid">
                        <div class="form-group">
                            <label>위병부조장</label>
                            <input type="text" id="lastSub" placeholder="예: 25-760000">
                        </div>
                        <div class="form-group">
                            <label>식기 (마지막 순번)</label>
                            <input type="text" id="lastDish" placeholder="예: 25-760000">
                        </div>
                        <div class="form-group">
                            <label>선임초병 (2조)</label>
                            <input type="text" id="lastSr" placeholder="군번 입력">
                        </div>
                        <div class="form-group">
                            <label>후임초병 (2조)</label>
                            <input type="text" id="lastJr" placeholder="군번 입력">
                        </div>
                        <div class="form-group">
                            <label>불침번 (6번초)</label>
                            <input type="text" id="lastNight" placeholder="군번 입력">
                        </div>
                        <div class="form-group">
                            <label>CCTV (6번초 마지막)</label>
                            <input type="text" id="lastCctv" placeholder="군번 입력">
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h2 class="section-title"><span class="section-number">04</span> 적용될 배정 순서</h2>
                    <p style="font-size: 16px; color: var(--text-sub); margin-bottom: 16px;">현재 시스템에 설정된 순서대로 배정됩니다. (설정 탭에서 변경 가능)</p>
                    <div class="badge-list">
                        <span class="badge">1. 위병부조장</span>
                        <span class="badge">2. 식기</span>
                        <span class="badge">3. 불침번</span>
                        <span class="badge">4. 초병</span>
                        <span class="badge">5. CCTV</span>
                    </div>
                </div>

                <div class="form-actions">
                    <span class="status-text">입력하신 데이터를 바탕으로 자동 배정을 시작합니다.</span>
                    <button type="button" id="runButton" class="btn-submit">근무표 생성하기</button>
                </div>

            </form>
        </div>
    </main>
</body>
</html>
